<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Shield - File Activity Monitoring</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
            text-shadow: 0 0 5px var(--color-primary-glow);
        }
    </style>
</head>
<body>
    <div id="app-layout">
        
        <main class="main-content" data-page-title="Real-Time File Monitoring">
            <div class="content-body">
                
                <div class="tabs">
                    <button id="tab-all" class="tab-btn active">All File Activities</button>
                    <button id="tab-suspicious" class="tab-btn">Suspicious Activities Only</button>
                </div>

                <div class="card">
                    <div class="section-header">
                        <h3 id="table-title" class="section-title">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9Z" /></svg>
                            File Scanner Operations Log
                        </h3>
                        <button id="btn-refresh" class="btn btn-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 14px; height: 14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>
                            Refresh Logs
                        </button>
                    </div>

                    <div class="table-container">
                        <table class="custom-table">
                            <thead>
                                <tr>
                                    <th>File Name</th>
                                    <th>Activity Type</th>
                                    <th>File Size</th>
                                    <th>Entropy</th>
                                    <th>Absolute Path</th>
                                    <th>Status</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody id="monitoring-table-body">
                                <tr>
                                    <td colspan="7" style="text-align: center; color: var(--text-muted);">Fetching logs from directory watcher...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Load scripts -->
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        let currentTab = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            const tabAll = document.getElementById('tab-all');
            const tabSuspicious = document.getElementById('tab-suspicious');
            const refreshBtn = document.getElementById('btn-refresh');

            // Initial load
            loadLogs();

            tabAll.addEventListener('click', () => {
                currentTab = 'all';
                tabAll.classList.add('active');
                tabSuspicious.classList.remove('active');
                document.getElementById('table-title').innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9Z" /></svg>
                    File Scanner Operations Log
                `;
                loadLogs();
            });

            tabSuspicious.addEventListener('click', () => {
                currentTab = 'suspicious';
                tabSuspicious.classList.add('active');
                tabAll.classList.remove('active');
                document.getElementById('table-title').innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" /></svg>
                    Flagged Anomalies & Threat Events
                `;
                loadLogs();
            });

            refreshBtn.addEventListener('click', () => {
                loadLogs();
            });

            // Poll for new logs every 4 seconds
            setInterval(loadLogs, 4000);
        });

        async function loadLogs() {
            try {
                let logs = [];
                if (currentTab === 'all') {
                    logs = await API.monitoring.getActivities();
                } else {
                    logs = await API.monitoring.getSuspicious();
                }
                
                renderLogs(logs);
            } catch (err) {
                console.error("Failed to load logs:", err);
            }
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('monitoring-table-body');
            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">No log records matching criteria.</td></tr>`;
                return;
            }

            tbody.innerHTML = logs.map(log => {
                const isSuspicious = log.isSuspicious;
                const statusBadge = isSuspicious 
                    ? `<span class="badge level-critical">SUSPICIOUS</span>` 
                    : `<span class="badge level-low">SAFE</span>`;
                
                const time = log.timestamp ? log.timestamp.replace('T', ' ').substring(0, 19) : 'N/A';
                const fileEntropy = log.entropy ? log.entropy.toFixed(4) : '0.0000';
                
                // Color code entropy based on severity
                let entropyStyle = '';
                if (log.entropy >= 7.0) {
                    entropyStyle = 'color: var(--color-danger); font-weight: bold; text-shadow: 0 0 4px rgba(239, 68, 68, 0.2);';
                } else if (log.entropy >= 5.0) {
                    entropyStyle = 'color: var(--color-warning); font-weight: 500;';
                }

                // Format file size
                const sizeStr = formatBytes(log.fileSize);

                let actClass = 'activity-modify';
                if (log.activityType === 'CREATE') actClass = 'activity-create';
                if (log.activityType === 'DELETE') actClass = 'activity-delete';

                return `
                    <tr>
                        <td style="font-weight: 600; font-family: monospace; font-size:12px;">${log.fileName}</td>
                        <td><span class="activity-badge ${actClass}">${log.activityType}</span></td>
                        <td style="color: var(--text-secondary);">${sizeStr}</td>
                        <td style="font-family: monospace; ${entropyStyle}">${fileEntropy}</td>
                        <td style="color: var(--text-muted); font-size: 11px; font-family: monospace; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${log.filePath}">
                            ${log.filePath}
                        </td>
                        <td>${statusBadge}</td>
                        <td style="color: var(--text-secondary); font-family: monospace; font-size: 12px;">${time}</td>
                    </tr>
                `;
            }).join('');
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
