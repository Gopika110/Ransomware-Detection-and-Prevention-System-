<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Shield - Security Authentication</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-container">

    <div class="card login-card">
        <div class="login-logo">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
            <h2 class="login-title">Aegis Cyber Shield</h2>
            <p style="font-size: 11px; color: var(--text-muted); text-align: center;">RANSOMWARE DETECTION & PREVENTION SYSTEM</p>
        </div>

        <div id="error-message" style="display: none; background-color: rgba(239, 68, 68, 0.1); border: 1px solid var(--color-danger); color: var(--color-danger); padding: 12px; border-radius: 6px; font-size: 12px; margin-bottom: 20px; text-align: center;">
            Invalid credentials. Please try again.
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Operator Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required value="admin">
            </div>
            
            <div class="form-group" style="margin-bottom: 28px;">
                <label for="password">Security Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required value="admin123">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 45px;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
                Authenticate Operator
            </button>
        </form>
    </div>

    <!-- Load API and session logic -->
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const errMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errMessage.style.display = 'none';

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const response = await API.auth.login(user, pass);
                if (response.success) {
                    sessionStorage.setItem('ransomware_token', response.token);
                    sessionStorage.setItem('ransomware_user', response.username);
                    window.location.href = 'dashboard.html';
                } else {
                    showError("Authentication failure. Check credentials.");
                }
            } catch (err) {
                showError(err.message || "Failed to connect to the backend security module.");
            }
        });

        function showError(message) {
            errMessage.textContent = message;
            errMessage.style.display = 'block';
        }
    </script>
</body>
</html>
