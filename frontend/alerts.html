<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Shield - Security Notifications</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .alerts-page-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .full-alert-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--color-primary);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .full-alert-card.severity-CRITICAL {
            border-left-color: var(--color-danger);
            background-color: rgba(239, 68, 68, 0.02);
        }
        .full-alert-card.severity-WARNING {
            border-left-color: var(--color-warning);
            background-color: rgba(245, 158, 11, 0.02);
        }
        .full-alert-card.severity-INFO {
            border-left-color: #64748b;
            background-color: rgba(100, 116, 139, 0.02);
        }
        .full-alert-card.unread {
            background-color: rgba(56, 189, 248, 0.06);
            border-color: rgba(56, 189, 248, 0.25);
        }
        .full-alert-card.unread::after {
            content: '•';
            color: var(--color-primary);
            font-size: 24px;
            line-height: 1;
            margin-left: 12px;
        }
        .alert-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .alert-body-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .alert-meta {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>
    <div id="app-layout">
        
        <main class="main-content" data-page-title="Security Alert Center">
            <div class="content-body">
                
                <div class="card" style="margin-bottom: 24px;">
                    <div class="section-header" style="margin-bottom: 0;">
                        <div>
                            <p style="font-size: 13px; color: var(--text-secondary);">Manage security logs, scan alerts, and notifications generated by the Aegis Watcher.</p>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button id="btn-refresh" class="btn btn-sm">Refresh Logs</button>
                            <button id="btn-clear-alerts" class="btn btn-sm btn-danger">Clear All Logs</button>
                        </div>
                    </div>
                </div>

                <div class="alerts-page-container" id="alerts-logs-list">
                    <div class="card" style="text-align: center; padding: 40px; color: var(--text-muted);">
                        Polling security notifications...
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Load scripts -->
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const refreshBtn = document.getElementById('btn-refresh');
            const clearBtn = document.getElementById('btn-clear-alerts');

            // Load alerts
            loadAlerts();

            refreshBtn.addEventListener('click', () => {
                loadAlerts();
            });

            clearBtn.addEventListener('click', async () => {
                if (!confirm("Are you sure you want to delete all alert log entries?")) return;
                try {
                    await API.alerts.clear();
                    loadAlerts();
                } catch (err) {
                    alert("Failed to clear alerts: " + err.message);
                }
            });

            // Poll alerts
            setInterval(loadAlerts, 4000);
        });

        async function loadAlerts() {
            try {
                const alerts = await API.alerts.getAll();
                renderAlerts(alerts);
            } catch (err) {
                console.error("Failed to load alerts:", err);
            }
        }

        function renderAlerts(alerts) {
            const container = document.getElementById('alerts-logs-list');
            if (alerts.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 40px 20px; color: var(--text-muted);">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 48px; height: 48px; margin: 0 auto 12px; color: var(--color-safe); opacity:0.6;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12Z" /></svg>
                        Security log cleared. Zero active incident notifications.
                    </div>
                `;
                return;
            }

            container.innerHTML = alerts.map(a => {
                const unreadClass = a.isRead ? '' : 'unread';
                const dateStr = a.timestamp ? a.timestamp.replace('T', ' ').substring(0, 19) : 'Just Now';
                
                // Get severity badge / color
                let levelText = 'INFO';
                let levelClass = 'level-low';
                if (a.severity === 'WARNING') { levelText = 'WARNING'; levelClass = 'level-high'; }
                if (a.severity === 'CRITICAL') { levelText = 'CRITICAL'; levelClass = 'level-critical'; }

                // Check action button
                const markReadBtn = !a.isRead 
                    ? `<button onclick="markAsRead(${a.id})" class="btn btn-sm" style="padding: 4px 8px; font-size: 10px;">Acknowledge</button>`
                    : '';

                return `
                    <div class="full-alert-card severity-${a.severity} ${unreadClass}">
                        <div class="alert-left">
                            <div>
                                <span class="badge ${levelClass}" style="margin-right: 12px;">${levelText}</span>
                            </div>
                            <div>
                                <div class="alert-body-text">${a.message}</div>
                                <div class="alert-meta">ID: #${a.id} | TIMESTAMP: ${dateStr}</div>
                            </div>
                        </div>
                        <div>
                            ${markReadBtn}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function markAsRead(id) {
            try {
                await API.alerts.read(id);
                loadAlerts();
            } catch (err) {
                console.error("Failed to mark alert as read:", err);
            }
        }
    </script>
</body>
</html>
